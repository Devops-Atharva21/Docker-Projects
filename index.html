<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCB Family</title>
    <style>
        /* Importing fonts for the main text and the signature */
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@800&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Red and black fade (gradient) */
            background: linear-gradient(135deg, #c8102e 0%, #000000 100%);
            color: #d4af37; /* RCB Gold */
            font-family: 'Montserrat', sans-serif;
            text-align: center;
        }

        h1 {
            font-size: 4.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.7);
        }

        .signature-container {
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .signature {
            font-family: 'Great Vibes', cursive;
            font-size: 4rem;
            color: #ffffff;
            transform: rotate(-5deg); /* Slight tilt for a natural handwritten look */
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            margin-bottom: 5px;
        }

        .name-label {
            font-size: 0.9rem;
            color: #cccccc;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <h1>Welcome to RCB Family</h1>

    <div class="signature-container">
        <div class="signature">Virat Kohli</div>
        <div class="name-label">No. 18</div>
    </div>

</body>
</html>
